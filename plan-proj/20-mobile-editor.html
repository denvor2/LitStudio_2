<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Mobile editor</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 380px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border);"><div style="display:flex;align-items:center;gap:10px;"><i class="ti ti-chevron-left" style="font-size:20px;color:var(--text-secondary);"></i><div><p style="font-size:15px;font-weight:500;margin:0;">Книга 1</p><p style="font-size:12px;color:var(--text-muted);margin:0;">Тералия · Chapter 1 / Scene 5</p></div></div></div>
<div style="display: flex; align-items: center; gap: 4px; padding: 6px 10px; border-bottom: 0.5px solid var(--border); overflow-x: auto;">
<button style="padding:6px 8px;border:none;background:none;"><i class="ti ti-arrow-back-up" style="font-size:17px;color:var(--text-secondary);"></i></button>
<button style="padding:6px 8px;border:none;background:none;"><i class="ti ti-bold" style="font-size:17px;color:var(--text-secondary);"></i></button>
<button style="padding:6px 8px;border:none;background:none;"><i class="ti ti-sparkles" style="font-size:17px;color:var(--text-accent);"></i></button>
<select style="margin-left:auto;font-size:11px;padding:3px 6px;"><option>Черновик</option><option>На редактуре</option><option>Вычитано</option><option>Финал</option></select>
</div>
<div style="padding: 14px;"><p style="font-size:13px;color:var(--text-muted);margin:0 0 4px;">Scene 5</p><div style="font-family:var(--font-voice);font-size:16px;line-height:1.7;">Майкл смотрел на экран, и <span style="text-decoration:underline wavy var(--text-danger);text-underline-offset:3px;">глаза расширились</span> прежде, чем он успел это осознать.</div>
<div style="margin-top:10px;padding:8px 10px;border:0.5px solid var(--border-danger);border-radius:var(--radius);background:var(--bg-danger);font-size:12px;color:var(--text-danger);">Стоп-лист: «глаза расширились»</div>
</div>
<div style="border-top: 0.5px solid var(--border); padding: 8px 14px; display: flex; justify-content: center; gap: 16px; font-size: 12px; color: var(--text-muted);"><span>Слов: 4</span><span>Знаков: 22</span><span>Без пробелов: 19</span></div>
<div style="border-top: 0.5px solid var(--border); display: flex;">
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-muted);"><i class="ti ti-book-2" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;">Коллекция</span></div>
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-accent);"><i class="ti ti-edit" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;font-weight:500;">Редактор</span></div>
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-muted);"><i class="ti ti-message-circle" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;">Помощники</span></div>
</div>
</div>
</div>

</body></html>
