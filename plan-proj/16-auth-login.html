<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Auth login</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="min-height: 420px; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border-radius: 12px; padding: 28px; width: 100%; max-width: 340px;">
<p style="font-size: 18px; font-weight: 500; text-align: center; margin: 0 0 4px;">Lib</p>
<p style="font-size: 12px; color: var(--text-muted); text-align: center; margin: 0 0 20px;">Literary Studio</p>
<p style="font-size: 11px; color: var(--text-muted); margin: 0 0 4px;">EMAIL</p>
<input placeholder="you@example.com" style="width:100%;font-size:13px;margin-bottom:12px;"/>
<p style="font-size: 11px; color: var(--text-muted); margin: 0 0 4px;">ПАРОЛЬ</p>
<input type="password" placeholder="••••••••" style="width:100%;font-size:13px;margin-bottom:6px;"/>
<p style="text-align:right;font-size:11px;color:var(--text-accent);margin:0 0 16px;">Забыли пароль?</p>
<button style="width:100%;padding:9px;font-size:13px;border-radius:var(--radius);background:var(--bg-accent);color:var(--text-accent);border:none;margin-bottom:10px;">Войти</button>
<p style="text-align:center;font-size:12px;color:var(--text-secondary);margin-top:18px;">Нет аккаунта? <span style="color:var(--text-accent);">Зарегистрироваться</span></p>
</div>
</div>

</body></html>
