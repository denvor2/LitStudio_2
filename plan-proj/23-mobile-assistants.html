<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Mobile assistants</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 380px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border);"><i class="ti ti-chevron-left" style="font-size:20px;color:var(--text-secondary);"></i><div><p style="font-size:15px;font-weight:500;margin:0;">Книга 1</p><p style="font-size:12px;color:var(--text-muted);margin:0;">Тералия · Chapter 1 / Scene 5</p></div></div>
<div style="padding: 10px 14px;">
<div style="display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px;">
<button style="flex-shrink:0;padding:6px 10px;font-size:12px;border-radius:14px;background:var(--bg-accent);color:var(--text-accent);border:none;">Критик</button>
<button style="flex-shrink:0;padding:6px 10px;font-size:12px;border-radius:14px;">Со-автор</button>
<button style="flex-shrink:0;padding:6px 10px;font-size:12px;border-radius:14px;">Редактор</button>
<button style="flex-shrink:0;padding:6px 10px;font-size:12px;border-radius:14px;">Читатель</button>
</div>
<div style="border: 0.5px solid var(--border-danger); background: var(--bg-danger); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 8px;"><p style="font-size:11px;color:var(--text-danger);font-weight:500;margin:0 0 2px;">⚠ Критично · Нестыковка с Библией мира</p><p style="font-size:11px;color:var(--text-secondary);margin:0;">По карточке Локации Майкл уже бывал в лаборатории в Сцене 2.</p></div>
<textarea placeholder="Что улучшить в этой сцене?" style="width:100%;min-height:44px;font-size:12px;margin-top:10px;"></textarea>
</div>
<div style="border-top: 0.5px solid var(--border); display: flex;">
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-muted);"><i class="ti ti-book-2" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;">Коллекция</span></div>
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-muted);"><i class="ti ti-edit" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;">Редактор</span></div>
<div style="flex:1;text-align:center;padding:10px 0;color:var(--text-accent);"><i class="ti ti-message-circle" style="font-size:20px;display:block;margin:0 auto 2px;"></i><span style="font-size:11px;font-weight:500;">Помощники</span></div>
</div>
</div>
</div>

</body></html>
