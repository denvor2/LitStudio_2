<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Desktop settings</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="min-height: 340px; background: rgba(0,0,0,0.2); display: flex; align-items: flex-start; justify-content: flex-end; border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; box-shadow: var(--shadow-lg); width: 260px; margin-top: 40px;">
<div style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 0.5px solid var(--border);"><div style="width:32px;height:32px;border-radius:50%;background:var(--bg-accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--text-accent);">N</div><div><p style="font-size:13px;font-weight:500;margin:0;">Денис</p><p style="font-size:11px;color:var(--text-muted);margin:0;">Профиль</p></div></div>
<p style="font-size: 10px; color: var(--text-muted); font-weight: 500; padding: 10px 14px 4px; margin: 0;">ФАЙЛ</p>
<button style="width:100%;display:flex;align-items:center;gap:10px;padding:7px 14px;border:none;background:none;text-align:left;font-size:12px;"><i class="ti ti-file-export" style="font-size:15px;color:var(--text-secondary);"></i>Экспорт книги</button>
<button style="width:100%;display:flex;align-items:center;gap:10px;padding:7px 14px;border:none;background:none;text-align:left;font-size:12px;"><i class="ti ti-file-import" style="font-size:15px;color:var(--text-secondary);"></i>Импорт книги</button>
<p style="font-size: 10px; color: var(--text-muted); font-weight: 500; padding: 10px 14px 4px; margin: 0;">ВИД</p>
<button style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border:none;background:none;font-size:12px;"><span>Тема</span><span style="color:var(--text-muted);">Светлая</span></button>
<button style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border:none;background:none;font-size:12px;"><span>Автосохранение</span><span style="color:var(--text-muted);">5 мин</span></button>
<div style="border-top: 0.5px solid var(--border); margin-top: 6px; padding-top: 6px;"><button style="width:100%;display:flex;align-items:center;gap:10px;padding:7px 14px;border:none;background:none;text-align:left;font-size:12px;color:var(--text-danger);"><i class="ti ti-logout" style="font-size:15px;"></i>Выйти</button></div>
</div>
</div>

</body></html>
