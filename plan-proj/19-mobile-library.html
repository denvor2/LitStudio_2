<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Mobile library</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 380px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 0.5px solid var(--border);"><span style="font-size:16px;font-weight:500;">Lib</span><div style="display:flex;align-items:center;gap:14px;"><div style="width:26px;height:26px;border-radius:50%;background:var(--bg-accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text-accent);">N</div><i class="ti ti-settings" style="font-size:20px;color:var(--text-secondary);"></i></div></div>
<div style="padding: 4px 0;">
<div style="padding: 10px 14px 6px; font-size: 11px; color: var(--text-muted); font-weight: 500;">ГЛАВЫ</div>
<div style="padding: 6px 14px 6px 20px; font-size: 13px;"><i class="ti ti-chevron-down" style="font-size:13px;color:var(--text-muted);margin-right:6px;"></i>Chapter 1</div>
<div style="padding: 5px 14px 5px 36px; font-size: 13px; background: var(--bg-accent); color: var(--text-accent);">Scene 1</div>
<div style="padding: 5px 14px 5px 36px; font-size: 13px; color: var(--text-secondary);">Scene 2</div>
<div style="border-top: 0.5px solid var(--border); padding: 10px 14px 4px; font-size: 11px; color: var(--text-muted); font-weight: 500;">ПЛАНИРОВАНИЕ · просмотр</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);"><i class="ti ti-grid-dots" style="font-size:14px;margin-right:7px;"></i>Матрица</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);"><i class="ti ti-timeline" style="font-size:14px;margin-right:7px;"></i>Таймлайн</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);"><i class="ti ti-affiliate" style="font-size:14px;margin-right:7px;"></i>Карта связей</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);"><i class="ti ti-chart-bar" style="font-size:14px;margin-right:7px;"></i>Статистика</div>
<div style="border-top: 0.5px solid var(--border); padding: 10px 14px 4px; font-size: 11px; color: var(--text-muted); font-weight: 500;">БИБЛИЯ МИРА</div>
<div style="padding: 5px 14px 5px 20px; font-size: 13px; color: var(--text-secondary);">Персонажи (2)</div>
<div style="padding: 5px 14px 5px 20px; font-size: 13px; color: var(--text-secondary);">Локации</div>
<div style="padding: 5px 14px 5px 20px; font-size: 13px; color: var(--text-secondary);">Организации</div>
<div style="padding: 5px 14px 5px 20px; font-size: 13px; color: var(--text-secondary);">Правила</div>
<div style="padding: 5px 14px 5px 20px; font-size: 13px; color: var(--text-secondary);">Термины</div>
<div style="border-top: 0.5px solid var(--border); padding: 10px 14px 4px; font-size: 11px; color: var(--text-muted); font-weight: 500;">СЕРИЯ</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);">Авторский стиль</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);">Идеи (1)</div>
<div style="padding: 5px 14px; font-size: 13px; color: var(--text-secondary);">Продакшн</div>
<div style="border-top: 0.5px solid var(--border); padding: 10px 14px; font-size: 13px; color: var(--text-muted);"><i class="ti ti-trash" style="font-size:14px;margin-right:7px;"></i>Корзина</div>
</div>
</div>
</div>

</body></html>
