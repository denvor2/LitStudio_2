<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Desktop author style</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; padding: 18px 20px; max-width: 500px;">
<p style="font-size: 12px; color: var(--text-muted); margin: 0 0 14px;">Тералия · Серия</p>
<p style="font-size: 12px; font-weight: 500; color: var(--text-secondary); margin: 0 0 8px;">СТОП-ЛИСТ ОБОРОТОВ</p>
<div style="border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 6px;">
<div style="display: flex; align-items: center; padding: 8px 10px; border-bottom: 0.5px solid var(--border); font-size: 12px;"><span style="flex:1;text-decoration:line-through;color:var(--text-danger);">сердце ёкнуло</span><span style="flex:1;color:var(--text-secondary);">переформулировать без штампа</span></div>
<div style="display: flex; align-items: center; padding: 8px 10px; font-size: 12px;"><span style="flex:1;text-decoration:line-through;color:var(--text-danger);">глаза расширились</span><span style="flex:1;color:var(--text-secondary);">описать реакцию иначе</span></div>
</div>
<button style="font-size: 12px; padding: 5px 10px; border-radius: var(--radius);">+ Добавить оборот</button>
<div style="margin-top: 16px;"><p style="font-size: 12px; font-weight: 500; color: var(--text-secondary); margin: 0 0 6px;">ПУНКТУАЦИОННЫЕ ПРАВИЛА</p><textarea placeholder="Внутренняя речь — курсивом без кавычек..." style="width:100%;min-height:50px;font-size:12px;"></textarea></div>
<div style="display: flex; gap: 10px; margin-top: 12px;"><div style="flex:1;"><p style="font-size:11px;color:var(--text-muted);font-weight:500;margin:0 0 4px;">POV / ВРЕМЯ</p><input placeholder="3-е лицо, прошедшее" style="width:100%;font-size:12px;"/></div><div style="flex:1;"><p style="font-size:11px;color:var(--text-muted);font-weight:500;margin:0 0 4px;">ТОНАЛЬНОСТЬ</p><input placeholder="Сдержанная, с холодной иронией" style="width:100%;font-size:12px;"/></div></div>
</div>
</div>

</body></html>
