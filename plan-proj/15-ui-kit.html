<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>UI kit</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 20px; max-width: 560px;">
<p style="font-size: 11px; color: var(--text-muted); font-weight: 500; margin: 0 0 8px;">КНОПКИ</p>
<div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
<button style="padding:7px 14px;font-size:13px;border-radius:var(--radius);background:var(--bg-accent);color:var(--text-accent);border:none;">Первичная</button>
<button style="padding:7px 14px;font-size:13px;border-radius:var(--radius);">Вторичная</button>
<button style="padding:7px 14px;font-size:13px;border-radius:var(--radius);background:none;border:none;color:var(--text-secondary);">Текстовая</button>
<button style="padding:7px 14px;font-size:13px;border-radius:var(--radius);background:var(--bg-danger);color:var(--text-danger);border:none;">Опасная</button>
</div>
<p style="font-size: 11px; color: var(--text-muted); font-weight: 500; margin: 0 0 8px;">ПОЛЯ ФОРМ</p>
<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;">
<input placeholder="По умолчанию" style="font-size:13px;width:150px;"/>
<input value="Фокус" style="font-size:13px;width:150px;border:1px solid var(--text-accent);"/>
<input value="Ошибка" style="font-size:13px;width:150px;border:1px solid var(--border-danger);"/>
</div>
<p style="font-size: 11px; color: var(--text-muted); font-weight: 500; margin: 0 0 8px;">СТАТУСНЫЕ БЕЙДЖИ</p>
<div style="display: flex; gap: 6px; flex-wrap: wrap;">
<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:var(--fill-secondary);color:var(--text-secondary);">Черновик</span>
<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:var(--bg-accent);color:var(--text-accent);">На редактуре</span>
<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:var(--bg-success);color:var(--text-success);">Финал</span>
<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:var(--bg-danger);color:var(--text-danger);">Ошибка</span>
</div>
</div>
</div>

</body></html>
