<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Desktop relations</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="display: flex; align-items: center; gap: 18px; padding: 6px 16px; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text-secondary);"><span>Файл</span><span>Редактировать</span><span>Вид</span><span>Руководство</span><span>О программе</span></div>
<div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 0.5px solid var(--border);">
  <div style="display: flex; align-items: center; gap: 8px; font-size: 14px;"><span style="font-weight: 500;">Тералия</span><i class="ti ti-chevron-right" style="font-size: 13px; color: var(--text-muted);"></i><span style="font-weight: 500;">Книга 1</span></div>
  <div style="display: flex; align-items: center; gap: 6px;">
    <button style="padding: 5px 10px; font-size: 12px; border-radius: var(--radius); background: var(--bg-accent); color: var(--text-accent); border: none;">Планирование</button>
    <button style="padding: 5px 10px; font-size: 12px; border-radius: var(--radius); background: var(--fill-secondary);">Написание</button>
    <div style="width: 22px; height: 22px; border-radius: 50%; background: var(--bg-accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--text-accent); margin-left: 8px;">N</div>
    <i class="ti ti-settings" style="font-size: 16px; color: var(--text-secondary);"></i>
  </div>
</div>
<div style="display: flex; min-height: 400px;">
  <div style="width: 152px; border-right: 0.5px solid var(--border); padding: 10px 0; flex-shrink: 0; display: flex; flex-direction: column;">
    
    <div style="padding: 9px 12px 4px; font-size: 11px; color: var(--text-muted); font-weight: 500;">ПЛАНИРОВАНИЕ</div>
    <div style="padding: 5px 12px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;"><i class="ti ti-grid-dots" style="font-size: 13px;"></i> Матрица</div>
    <div style="padding: 5px 12px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;"><i class="ti ti-timeline" style="font-size: 13px;"></i> Таймлайн</div>
    <div style="padding: 5px 12px; font-size: 12px; font-weight: 500; background: var(--bg-accent); color: var(--text-accent); display: flex; align-items: center; gap: 6px;"><i class="ti ti-affiliate" style="font-size: 13px;"></i> Карта связей</div>
    <div style="padding: 5px 12px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;"><i class="ti ti-chart-bar" style="font-size: 13px;"></i> Статистика</div>

    <div style="margin-top: auto; padding: 8px 12px; font-size: 12px; color: var(--text-muted); border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 6px;"><i class="ti ti-trash" style="font-size: 13px;"></i> Корзина</div>
  </div>
  <div style="flex: 1; display: flex; flex-direction: column; min-width: 0;">
<div style="display: flex; align-items: center; padding: 8px 16px; border-bottom: 0.5px solid var(--border);"><span style="font-size: 13px; font-weight: 500;">Карта связей</span></div>
<svg viewBox="0 0 480 300" style="width: 100%; height: 320px;">
<line x1="110" y1="70" x2="230" y2="60" stroke="var(--border-strong)" stroke-width="1"/>
<line x1="90" y1="180" x2="230" y2="230" stroke="var(--text-accent)" stroke-width="1.5"/>
<g><rect x="75" y="55" width="70" height="28" rx="14" fill="#EEEDFE"/><text x="110" y="73" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C">Майкл</text></g>
<g><rect x="195" y="45" width="70" height="28" rx="14" fill="#EEEDFE"/><text x="230" y="63" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C">Джордан</text></g>
<g><rect x="195" y="216" width="70" height="28" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/><text x="230" y="234" text-anchor="middle" font-size="11" font-weight="500" fill="#04342C">Заповедник</text></g>
</svg>
</div>
  <div style="width: 220px; border-left: 0.5px solid var(--border); display: flex; flex-direction: column;">
<div style="display: flex; border-bottom: 0.5px solid var(--border);">
<button style="flex:1;padding:8px;font-size:12px;background:var(--bg-accent);color:var(--text-accent);border:none;">Карточка</button>
<button style="flex:1;padding:8px;font-size:12px;background:none;border:none;color:var(--text-secondary);">AI</button>
</div>
<div style="padding: 12px;"><p style="font-size:13px;font-weight:500;margin:0;">Заповедник</p><p style="font-size:12px;color:var(--text-secondary);margin:6px 0;">Охраняемая территория, где Холлоуэй скрывает первые аномалии.</p>
<button style="width:100%;display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;font-size:12px;border-radius:var(--radius);background:var(--bg-accent);color:var(--text-accent);border:none;"><i class="ti ti-sparkles" style="font-size:13px;"></i>Спросить AI</button></div>
</div>
</div>
</div>
</div>

</body></html>
