<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Desktop book properties</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 16px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="display: flex; align-items: center; gap: 18px; padding: 6px 16px; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text-secondary);"><span>Файл</span><span>Редактировать</span><span>Вид</span><span>Руководство</span><span>О программе</span></div>
<div style="display: flex; align-items: center; padding: 10px 16px; border-bottom: 0.5px solid var(--border); font-size: 14px;"><span style="font-weight: 500;">Тералия</span><i class="ti ti-chevron-right" style="font-size:13px;color:var(--text-muted);margin:0 8px;"></i><span style="color:var(--text-secondary);">Новая книга</span></div>
<div style="display: flex; border-bottom: 0.5px solid var(--border); padding: 0 16px;">
<button style="padding: 9px 14px; font-size: 12px; border: none; background: none; border-bottom: 2px solid var(--text-accent); color: var(--text-accent); font-weight: 500;">Реквизиты</button>
<button style="padding: 9px 14px; font-size: 12px; border: none; background: none; color: var(--text-secondary);">Продакшн</button>
<button style="padding: 9px 14px; font-size: 12px; border: none; background: none; color: var(--text-secondary);">Публикация</button>
</div>
<div style="padding: 18px 20px; max-width: 480px;">
<input placeholder="Заголовок книги" style="width:100%;font-size:18px;font-weight:500;border:none;border-bottom:0.5px solid var(--border);padding:6px 0;margin-bottom:10px;"/>
<input placeholder="Подзаголовок" style="width:100%;font-size:13px;border:none;border-bottom:0.5px solid var(--border);padding:6px 0;margin-bottom:14px;color:var(--text-secondary);"/>
<div style="display:flex;gap:10px;margin-bottom:14px;"><input placeholder="Жанр" style="flex:1;font-size:13px;"/><input placeholder="Теги" style="flex:1;font-size:13px;"/></div>
<p style="font-size:11px;color:var(--text-muted);font-weight:500;margin:0 0 4px;">КРАТКАЯ АННОТАЦИЯ</p>
<textarea placeholder="Пара предложений для каталога" style="width:100%;min-height:50px;font-size:13px;"></textarea>
</div>
</div>
</div>

</body></html>
