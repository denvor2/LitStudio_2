<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Mobile header states</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 380px;">
<p style="font-size: 12px; color: var(--text-muted); margin: 0 0 6px 4px;">Без выбранной книги</p>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;"><span style="font-size:16px;font-weight:500;">Lib</span><div style="display:flex;align-items:center;gap:14px;"><div style="width:26px;height:26px;border-radius:50%;background:var(--bg-accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text-accent);">N</div><i class="ti ti-settings" style="font-size:20px;color:var(--text-secondary);"></i></div></div>
<p style="font-size: 12px; color: var(--text-muted); margin: 0 0 6px 4px;">Книга выбрана</p>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;"><div style="display:flex;align-items:center;gap:10px;"><i class="ti ti-chevron-left" style="font-size:20px;color:var(--text-secondary);"></i><div><p style="font-size:15px;font-weight:500;margin:0;">Книга 1</p><p style="font-size:12px;color:var(--text-muted);margin:0;">Тералия · Chapter 1 / Scene 1</p></div></div><div style="width:24px;height:24px;border-radius:50%;background:var(--bg-accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text-accent);">N</div></div>
</div>

</body></html>
