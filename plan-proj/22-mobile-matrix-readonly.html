<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Mobile matrix readonly</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 12px; max-width: 380px;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden;">
<div style="padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border);"><i class="ti ti-chevron-left" style="font-size:20px;color:var(--text-secondary);"></i><span style="font-size:15px;font-weight:500;">Матрица · просмотр</span></div>
<div style="padding: 10px 14px;">
<div style="border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 8px;"><p style="font-size:11px;color:var(--text-muted);margin:0 0 4px;">БИТ 1</p>
<div style="font-size:12px;padding:2px 0;"><i class="ti ti-check" style="font-size:12px;color:var(--text-accent);margin-right:6px;"></i><b>Майкл/АНБ:</b> Совещание</div>
<div style="font-size:12px;padding:2px 0;"><i class="ti ti-check" style="font-size:12px;color:var(--text-accent);margin-right:6px;"></i><b>Холлоуэй:</b> Эксперт</div>
</div>
<div style="border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; opacity: 0.65;"><p style="font-size:11px;color:var(--text-muted);margin:0 0 4px;">БИТ 2</p><div style="font-size:12px;color:var(--text-muted);">Холлоуэй: Джордан приходит (не написано)</div></div>
</div>
<div style="border-top: 0.5px solid var(--border); padding: 8px 14px; font-size: 11px; color: var(--text-muted); text-align: center;">Полное редактирование — на десктопе</div>
</div>
</div>

</body></html>
