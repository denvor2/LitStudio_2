<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Save indicator</title>
<style>
  :root {
    --surface-2: #ffffff; --surface-1: #f4f3ef; --page-bg: #ece9e2;
    --border: rgba(20,20,18,0.12); --border-strong: rgba(20,20,18,0.24);
    --border-danger: rgba(163,45,45,0.4); --border-warning: rgba(133,79,11,0.4);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #8a8980;
    --text-danger: #a32d2d; --text-warning: #854f0b; --text-success: #0f6e56; --text-accent: #185fa5;
    --bg-accent: #e6f1fb; --bg-danger: #fcebeb; --bg-warning: #faeeda; --bg-success: #eaf3de;
    --fill-secondary: rgba(20,20,18,0.06); --fill-warning: #ef9f27; --fill-danger: #e24b4a;
    --radius: 8px; --shadow-md: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 24px rgba(0,0,0,0.14);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-voice: Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); font-family: var(--font-sans); color: var(--text-primary); padding: 24px 12px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  textarea, input, select { font-family: var(--font-sans); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">

</head><body>

<div style="background: var(--surface-1); border-radius: 12px; padding: 16px;">
<p style="font-size: 11px; color: var(--text-muted); font-weight: 500; margin: 0 0 10px;">ИНДИКАТОР СОХРАНЕНИЯ (нижний правый угол)</p>
<div style="display: flex; gap: 20px; flex-wrap: wrap;">
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 30px; display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted);"><span style="width:7px;height:7px;border-radius:50%;background:#1D9E75;"></span>сохранено только что</div>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 30px; display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-warning);"><span style="width:7px;height:7px;border-radius:50%;background:var(--fill-warning);"></span>12 мин назад</div>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 30px; display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-danger);"><span style="width:7px;height:7px;border-radius:50%;background:var(--fill-danger);"></span>офлайн, в очереди</div>
</div>
</div>

</body></html>
